name: Deploy Coligo Backend (Robust)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true # Arrête le déploiement à la première erreur
          script: |
            cd /var/www/coligo-backend
            
            echo "🚀 Starting deployment..."

            # 1. Protection Git : Annule tout changement local accidentel
            git reset --hard HEAD
            git pull origin main

            # 2. Mode Maintenance
            php artisan down || true

            # 3. Installation des dépendances (PHP 8.4)
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

            # 4. Base de données
            echo "📦 Running migrations..."
            php artisan migrate --force

            # 5. Optimisation et Cache
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan l5-swagger:generate

            # 6. Gestion des permissions
            echo "🔐 Fixing permissions..."
            sudo chown -R www-data:www-data .
            sudo chmod -R 775 storage bootstrap/cache

            # 7. Redémarrage des services
            echo "🔄 Restarting services..."
            # Restart PHP-FPM pour vider l'OPcache
            sudo systemctl restart php8.4-fpm
            
            # Restart WebSockets proprement
            # On cherche le process et on le tue seulement s'il existe
            PID=$(pgrep -f "artisan websockets:serve" || echo "")
            if [ ! -z "$PID" ]; then
              kill -9 $PID
            fi
            # Relance en arrière-plan sans bloquer le workflow
            nohup php artisan websockets:serve --host 0.0.0.0 --port 6001 > storage/logs/websockets.log 2>&1 &

            # 8. Fin de maintenance
            php artisan up

            echo "✅ Deployment finished successfully!"
