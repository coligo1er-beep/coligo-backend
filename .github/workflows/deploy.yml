name: Deploy Coligo Backend (Robust)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true # Arrête le déploiement à la première erreur
          script: |
            cd /var/www/coligo-backend
            
            echo "🚀 Starting deployment..."

            # 1. Protection Git : Annule tout changement local accidentel
            git reset --hard HEAD
            git pull origin main

            # 2. Mode Maintenance
            php artisan down || true

            # 3. Installation des dépendances (PHP 8.4)
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

            # 4. Base de données
            echo "📦 Running migrations..."
            php artisan migrate --force

            # 5. Optimisation et Cache
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan l5-swagger:generate

            # 6. Gestion des permissions
            echo "🔐 Fixing permissions..."
            chown -R www-data:www-data .
            chmod -R 775 storage bootstrap/cache

            # 7. Configuration et Redémarrage des services
            echo "🔄 Restarting services..."
            systemctl restart php8.4-fpm
            
            # Création/Mise à jour du service Systemd pour les WebSockets
            echo "[Unit]
            Description=Laravel WebSockets Server
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/var/www/coligo-backend
            ExecStart=/usr/bin/php artisan websockets:serve --host 0.0.0.0 --port 6001
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target" > /etc/systemd/system/coligo-websockets.service

            # Rechargement et redémarrage du service
            systemctl daemon-reload
            systemctl enable coligo-websockets
            systemctl restart coligo-websockets
            
            # 8. Fin de maintenance
            php artisan up

            echo "✅ Deployment finished successfully!"
